name: Daily AI Digest

on:
  schedule:
    # 早版：北京时间 8:00 AM = UTC 0:00
    - cron: "0 0 * * *"
    # 晚版：北京时间 8:00 PM = UTC 12:00
    - cron: "0 12 * * *"
  workflow_dispatch:  # 允许手动触发
  push:
    paths:
      - 'src/**'
      - '.github/workflows/daily-digest.yml'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch RSS sources
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python src/fetch_sources.py /tmp/articles_raw.json

      - name: Summarize with DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python src/summarize.py /tmp/articles_raw.json /tmp/articles_summarized.json

      - name: Render HTML
        run: python src/render.py /tmp/articles_summarized.json docs/index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "📰 $(date +'%Y-%m-%d') 每日资讯更新"
            git push
          fi
